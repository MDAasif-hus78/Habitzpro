<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HabitzPro — Create Account</title>
  <link rel="stylesheet" href="../css/auth.css"/>
  <style>
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      position: fixed; top: 22px; left: 22px; z-index: 300;
      font-size: 13px; font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      padding: 7px 14px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 100px;
      box-shadow: 0 3px 14px var(--shadow);
      transition: all 0.25s;
    }
    .back-link:hover { color: var(--primary); border-color: var(--primary); transform: translateY(-1px); }
  </style>
  <script src="api.js"></script>
</head>
<body>

  <a href="auth.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <path d="M13 8H3M7 4L3 8l4 4" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back
  </a>

  <button class="theme-toggle" id="themeToggle">
    <span class="toggle-icon" id="toggleIcon">☀️</span>
    <span id="toggleLabel">Light</span>
  </button>

  <div class="page">
    <div class="auth-card">

      <!-- Brand -->
      <div class="brand-mark">
        <a href="Main_file.html">
          <div class="brand-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M4 10l4 4 8-8" stroke="#fff" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="brand-name">Habitz<span>pro</span></span>
        </a>
      </div>

      <!-- Heading -->
      <div class="card-heading">
        <h1>Create your account ✨</h1>
      </div>
      <p class="card-sub">Join thousands building better habits every day.</p>

      <!-- Social -->
      <div class="social-btns">
        <button class="social-btn google" onclick="socialAuth('Google')">
          <svg class="social-icon" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
        <button class="social-btn facebook" onclick="socialAuth('Facebook')">
          <svg class="social-icon" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073C24 5.404 18.627 0 12 0S0 5.404 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
          </svg>
          Continue with Facebook
        </button>
      </div>

      <!-- OR divider -->
      <div class="or-divider"><span>or sign up with email</span></div>

      <!-- Form -->
      <form class="auth-form" onsubmit="handleSignup(event)">

        <!-- Name row -->
        <div class="form-row">
          <div class="form-group">
            <label for="fname">First name</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.6"/>
                  <path d="M2 14c0-3.3 2.7-5 6-5s6 1.7 6 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
              </span>
              <input type="text" id="fname" placeholder="Alex" required autocomplete="given-name"/>
            </div>
          </div>
          <div class="form-group">
            <label for="lname">Last name</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.6"/>
                  <path d="M2 14c0-3.3 2.7-5 6-5s6 1.7 6 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
              </span>
              <input type="text" id="lname" placeholder="Johnson" required autocomplete="family-name"/>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/>
                <path d="M1 6l7 4 7-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </span>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
                <path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </span>
            <input type="password" id="password" placeholder="Create a strong password"
              required autocomplete="new-password" oninput="checkStrength(this.value)"/>
            <button type="button" class="pw-toggle" onclick="togglePw('password', this)">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </button>
          </div>
          <div class="strength-bar" id="strengthBar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="form-group">
          <label for="confirm">Confirm password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
                <path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </span>
            <input type="password" id="confirm" placeholder="Confirm your password"
              required autocomplete="new-password"/>
            <button type="button" class="pw-toggle" onclick="togglePw('confirm', this)">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="signupBtn" style="margin-top:6px;">
          Create Account
        </button>
      </form>

      <!-- Terms -->
      <p class="terms">
        By creating an account you agree to our
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </p>

      <!-- Switch -->
      <p class="switch-link">
        Already have an account?
        <a href="login.html">Sign in →</a>
      </p>

    </div>
  </div>

  <script>
    /* Theme */
    const root = document.documentElement;
    const tbtn = document.getElementById('themeToggle');
    const ticon = document.getElementById('toggleIcon');
    const tlbl = document.getElementById('toggleLabel');
    let dark = localStorage.getItem('hpTheme') === 'dark';
    applyTheme();
    tbtn.addEventListener('click', () => {
      dark = !dark;
      localStorage.setItem('hpTheme', dark ? 'dark' : 'light');
      applyTheme();
    });
    function applyTheme() {
      root.setAttribute('data-theme', dark ? 'dark' : 'light');
      ticon.textContent = dark ? '🌙' : '☀️';
      tlbl.textContent  = dark ? 'Dark' : 'Light';
    }

    /* Password toggle */
    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      const showing = inp.type === 'text';
      inp.type = showing ? 'password' : 'text';
      btn.innerHTML = showing
        ? `<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.6"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.6"/></svg>`
        : `<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 2l12 12M6.5 6.6A2 2 0 0 0 9.4 9.5M4.2 4.3C2.8 5.3 1.6 6.8 1 8c1.2 2.7 4 5 7 5a7 7 0 0 0 3.8-1.2M7 3.1A7 7 0 0 1 15 8c-.4.9-1 1.8-1.8 2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`;
    }

    /* Password strength */
    function checkStrength(val) {
      const bar   = document.getElementById('strengthBar');
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      bar.style.display = fill.style.display = label.style.display = val ? 'block' : 'none';
      if (!val) return;

      let score = 0;
      if (val.length >= 8)  score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { w:'25%',  c:'#e85d5d', t:'Weak' },
        { w:'50%',  c:'#f5a623', t:'Fair' },
        { w:'75%',  c:'#4A90E2', t:'Good' },
        { w:'100%', c:'#50E3C2', t:'Strong 💪' },
      ];
      const lv = levels[score - 1] || levels[0];
      fill.style.width      = lv.w;
      fill.style.background = lv.c;
      label.textContent     = lv.t;
      label.style.color     = lv.c;
    }

    // Redirect to dashboard if already logged in
HabitzAPI.redirectIfLoggedIn('dashboard.html');

async function handleSignup(e) {
  e.preventDefault();
  const pw  = document.getElementById('password').value;
  const cfm = document.getElementById('confirm').value;
  if (pw !== cfm) { alert('Passwords do not match!'); return; }

  const btn = document.getElementById('signupBtn');
  btn.textContent = 'Creating account…';
  btn.style.pointerEvents = 'none';

  try {
    await HabitzAPI.AuthAPI.register({
      firstName: document.getElementById('fname').value.trim(),
      lastName:  document.getElementById('lname').value.trim(),
      email:     document.getElementById('email').value.trim(),
      password:  pw,
    });
    window.location.href = 'dashboard.html';

  } catch (err) {
    btn.textContent = 'Create Account';
    btn.style.pointerEvents = '';
    alert(err.message || 'Sign up failed. Please try again.');
  }
}

    /* Social */
    function socialAuth(provider) {
      alert(`Redirecting to ${provider} OAuth…\n(Connect your OAuth provider here)`);
    }
  </script>
</body>
</html>
